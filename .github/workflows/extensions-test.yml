name: Extensions Tests

on:
  workflow_dispatch:
  push:
    branches: [ "main" ]
  pull_request:
  merge_group:
    branches: [ "main" ]

env:
  CARGO_TERM_COLOR: always
  PROTOC_VERSION: 3.23.4

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  c-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sqlanywhere-sqlite3
    name: CR SQLite C Tests

    steps:
      - uses: hecrj/setup-rust-action@v2
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: build sqlanywhere
        run: |
          ./configure
          make sqlanywhere
      - name: build
        run: |
          cd ext/crr
          make loadable
      - name: test
        run: |
          cd ext/crr
          make test

  rs-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sqlanywhere-sqlite3
    name: CR SQLite Rust Tests

    steps:
      - uses: hecrj/setup-rust-action@v2
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: build sqlanywhere
        run: |
          ./configure
          make sqlanywhere
      - name: test
        run: |
          cd ext/crr/rs/core
          cargo test --features=loadable_extension

  extensions-tests:
    runs-on: ubuntu-latest
    name: Extensions Tests

    steps:
      - uses: hecrj/setup-rust-action@v2
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: install libs
        run: |
          sudo apt install libblas-dev liblapack-dev
      - name: build sqlanywhere and ffi bindings
        run: |
          cargo xtask build-bundled
      - name: download extensions
        run: |
          cd sqlanywhere-sqlite3/test/rust_suite
          export VSS_VERSION="v0.1.2"
          wget https://github.com/asg017/sqlite-vss/releases/download/$VSS_VERSION/sqlite-vss-$VSS_VERSION-loadable-linux-x86_64.tar.gz
          tar -xvf sqlite-vss-$VSS_VERSION-loadable-linux-x86_64.tar.gz -C src
      - name: test
        run: |
          cd sqlanywhere-sqlite3/test/rust_suite
          # Only execute extensions tests
          cargo test --features=extensions extensions
